<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kelulusan SMKN 4 Kupang</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #7c2d12 0%, #3d0e02 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .logo-area { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .logo-area img { height: 70px; object-fit: contain; }
        
        .school-name { font-family: 'Lora', serif; font-size: 28px; font-weight: bold; margin: 0; letter-spacing: 1px; }
        .subtitle { font-size: 14px; opacity: 0.8; margin-top: 5px; margin-bottom: 30px; }

        .login-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); color: #1f2937; text-align: left; }
        
        /* Tab System */
        .tabs { display: flex; border-bottom: 1px solid #f3f4f6; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: #6b7280; transition: 0.3s; }
        .tab.active { background-color: #7c2d12; color: white; }

        .form-content { padding: 40px; }
        .form-title { font-family: 'Lora', serif; font-size: 24px; font-weight: bold; color: #111827; margin-bottom: 8px; }
        .form-desc { font-size: 14px; color: #6b7280; margin-bottom: 25px; }

        .input-label { display: block; font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 8px; }
        .input-field { width: 100%; padding: 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; outline: none; transition: 0.3s; font-size: 16px; margin-bottom: 20px; }
        .input-field:focus { border-color: #7c2d12; box-shadow: 0 0 0 4px rgba(124, 45, 18, 0.1); }

        .btn-cek { width: 100%; background-color: #7c2d12; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-cek:hover { background-color: #5c1a08; transform: translateY(-2px); }

        .footer { margin-top: 30px; font-size: 12px; opacity: 0.6; }

        /* Hasil Card */
        .result-screen { padding: 40px; text-align: center; }
        .status-badge { background: #16a34a; color: white; padding: 10px 30px; border-radius: 50px; font-weight: 800; font-size: 24px; display: inline-block; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Area Logo & Judul -->
        <div class="logo-area">
            <img src="https://cloudinary.com" alt="Logo NTT">
            <img src="https://cloudinary.com" alt="Logo SMKN 4">
        </div>
        <h1 class="school-name">SMKN 4 KUPANG</h1>
        <p class="subtitle">Sistem Informasi Kelulusan Siswa</p>

        <!-- Card Utama -->
        <div id="main-card" class="login-card">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab">
                    <svg xmlns="http://w3.org" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z""")/>></svg>
                    Admin
                </div>
                <div class="tab active">
                    <svg xmlns="http://w3.org" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2""")/>><circle cx="12" cy="7" r="4""")/>></svg>
                    Siswa
                </div>
            </div>

            <!-- Form Siswa -->
            <div id="login-form" class="form-content">
                <h2 class="form-title">Cek Kelulusan</h2>
                <p class="form-desc">Masukkan NISN untuk melihat status kelulusan</p>
                
                <label class="input-label">NISN</label>
                <input id="input-nisn" type="text" placeholder="Masukkan NISN" class="input-field">
                
                <button onclick="prosesLogin()" id="btn-text" class="btn-cek">Cek Kelulusan Saya</button>
                <p id="pesan" class="text-center text-sm mt-4 font-semibold text-gray-500 hidden"></p>
            </div>

            <!-- Hasil (Tersembunyi) -->
            <div id="result-screen" class="result-screen hidden">
                <div class="status-badge">LULUS</div>
                <p class="text-gray-400 text-xs uppercase font-bold">Nama Siswa</p>
                <h3 id="v-nama" class="text-xl font-bold mb-4 uppercase">ADRIAN MOY</h3>
                <p class="text-gray-400 text-xs uppercase font-bold">NISN</p>
                <p id="v-nisn" class="font-semibold mb-6"></p>
                
                <button onclick="location.reload()" class="text-sm text-gray-400 underline">Kembali</button>
            </div>
        </div>

        <div class="footer">
            © 2026 SMKN 4 Kupang — Crew Curriculum_HAFJ
        </div>
    </div>

    <script>
        async function prosesLogin() {
            const nisn = document.getElementById('input-nisn').value.trim();
            const pesan = document.getElementById('pesan');
            const btn = document.getElementById('btn-text');

            // --- MASUKKAN LINK WEB APP GOOGLE ANDA DI BAWAH INI ---
            const url = "https://script.google.com/macros/s/AKfycbwLBGoBQwx3MUQxaeiUzsxcWsdRi3E8fDexiplHbN4oHud7hHowWWTecbNBVZlTYgzNxg/exec";

            if(!nisn) { alert("Tolong isi NISN dulu ya!"); return; }

            pesan.innerText = "Mencari data siswa...";
            pesan.classList.remove('hidden');
            btn.innerText = "Sedang Mencari...";
            btn.disabled = true;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const s = data.find(item => String(item.nisn).trim() === nisn);

                if(s) {
                    document.getElementById('v-nama').innerText = s.nama_siswa;
                    document.getElementById('v-nisn').innerText = s.nisn;
                    
                    document.getElementById('login-form').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                } else {
                    pesan.innerText = "Maaf, NISN tidak ditemukan!";
                    pesan.style.color = "red";
                    btn.innerText = "Cek Kelulusan Saya";
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Gagal koneksi. Periksa internet atau link Apps Script!");
                btn.innerText = "Cek Kelulusan Saya";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
